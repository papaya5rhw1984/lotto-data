name: Update lotto data

on:
  schedule:
    # 추첨은 매주 토요일 약 20:45 KST. 그 이후 시점에 갱신 시도.
    - cron: "0 13 * * 6"   # 토 13:00 UTC = 토 22:00 KST
    - cron: "0 1 * * 0"    # 일 01:00 UTC = 일 10:00 KST (보강 재시도)
  workflow_dispatch: {}     # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

# 동시에 여러 번 돌지 않도록
concurrency:
  group: update-lotto
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run updater
        run: bash scripts/update.sh

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add all.json latest.json
            git commit -m "chore: update lotto data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "변경 없음"
          fi
